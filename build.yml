name: Build Harry A.I. Windows App

on:
  push:
    branches: [ main ]
    paths:
      - 'harry-ai.html'
      - 'main.js'
      - 'package.json'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Copy HTML to index.html
        run: copy harry-ai.html index.html

      - name: Install dependencies
        run: npm ci

      - name: Build Windows EXE
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: HarryAI-Windows
          path: dist/HarryAI-Setup.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v${{ github.run_number }}
          name: Harry A.I. v${{ github.run_number }}
          body: |
            Windows installer — auto-built from latest code.

            **Download:** HarryAI-Setup.exe below
            **Web version:** https://catcherntheryangl-sketch.github.io/harry-ai
          files: dist/HarryAI-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
