name: Build Harry A.I.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: copy harry-ai.html index.html
        shell: cmd
      - run: npm install
      - run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: dir dist
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: HarryAI-Windows
          path: dist/*.exe
          if-no-files-found: warn
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Harry A.I. v${{ github.run_number }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
